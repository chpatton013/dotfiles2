---

- name: Create Gem directory
  file:
    dest: "{{gem_data_dir}}"
    state: directory
    mode: 0700

- name: Render Gem Vars template file
  template:
    src: vars.sh
    dest: "{{shellrc_config_dir}}/0-gem.sh"
    mode: 0400

# Install into gem_data_dir/bin (the dir this role puts on PATH). The ansible
# gem module can't be used here: it defaults user_install to yes (diverting to
# ~/.gem/ruby/<ver>), and even with user_install:no + install_dir it sees any
# global ~/.gem copy via GEM_PATH and skips, leaving gem_data_dir/bin empty.
# An explicit install with a per-item creates guard is idempotent and lands the
# executables where the shellrc expects them regardless of ~/.gem state.
- name: Install Gem dev-tools packages
  command:
    cmd: "gem install --install-dir {{gem_data_dir}} --bindir {{gem_data_dir}}/bin --no-document {{item.name}}"
    creates: "{{gem_data_dir}}/bin/{{item.bin}}"
  with_items:
  - {name: neovim, bin: neovim-ruby-host}
  - {name: rubocop, bin: rubocop}
  - {name: sass, bin: sass}

- name: Link Gem Shell RC file
  file:
    src: "{{dotfiles_src_dir}}/gem/{{item}}"
    dest: "{{shellrc_config_dir}}/{{item}}"
    state: link
    follow: no
    force: yes
  with_items:
  - 3-gem.sh
