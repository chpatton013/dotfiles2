---

- name: Create Pi Agent directories
  file:
    dest: "{{item}}"
    state: directory
    mode: 0700
  with_items:
    - "{{pi_config_dir}}"
    - "{{pi_node_dir}}"
    - "{{'~/.pi/agent' | expanduser}}"

# Install the agent itself (the config below only sets up its settings). Pi is
# an npm package (Node >= 22.19); install it as a global into the shared npm
# prefix (npm_data_dir/bin, already on PATH via the npm role) — the same
# mechanism as the other npm CLIs, uniform across macOS and Linux. The official
# pi.dev installer is just an interactive wrapper around this same npm install.
- name: Install the Pi Agent CLI (npm global)
  npm:
    name: "@earendil-works/pi-coding-agent"
    global: yes
  environment:
    NPM_PREFIX: "{{npm_data_dir}}"

- name: Render Pi Agent Vars template file
  template:
    src: vars.sh
    dest: "{{shellrc_config_dir}}/0-pi-agent.sh"
    mode: 0400

- name: Link Pi Agent config files (XDG)
  file:
    src: "{{dotfiles_src_dir}}/pi-agent/{{item}}"
    dest: "{{pi_config_dir}}/{{item}}"
    state: link
    follow: no
    force: yes
  with_items:
  - settings.json
  - models.json

- name: Link Pi Agent config files (~/.pi/agent/)
  file:
    src: "{{dotfiles_src_dir}}/pi-agent/{{item}}"
    dest: "{{'~/.pi/agent' | expanduser}}/{{item}}"
    state: link
    follow: no
    force: yes
  with_items:
  - settings.json
  - models.json

- name: Link Pi Node Shell RC file
  file:
    src: "{{dotfiles_src_dir}}/pi-agent/{{item}}"
    dest: "{{shellrc_config_dir}}/{{item}}"
    state: link
    follow: no
    force: yes
  with_items:
  - 3-pi-agent.sh
