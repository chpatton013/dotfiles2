---

neovim_config_dir: "{{dotfiles_config_dir}}/neovim"
neovim_data_dir: "{{dotfiles_data_dir}}/neovim"
# release-metadata:
#   upstream: https://github.com/neovim/neovim/releases (tag vX.Y.Z)
#   line: current stable; minor bumps (e.g. 0.11 -> 0.12) can break init.lua
#   validation: interactive -- Darwin-gated build (brew provides nvim on macOS);
#     init.lua must be smoke-tested in a running nvim (UI/plugins/:checkhealth).
neovim_release_version: 0.12.4
neovim_release_url: "https://github.com/neovim/neovim/archive/refs/tags/v{{neovim_release_version}}.tar.gz"
neovim_release_dir: "{{source_releases_data_dir}}/neovim-{{neovim_release_version}}"
