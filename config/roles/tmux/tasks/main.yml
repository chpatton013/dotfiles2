---

- name: Download and unpack Tmux release tarball
  unarchive:
    src: "{{tmux_release_url}}"
    dest: "{{source_releases_data_dir}}"
    remote_src: yes

- name: Read recorded Tmux build version
  slurp:
    src: "{{tmux_build_stamp}}"
  register: tmux_build_stamp_slurp
  failed_when: false

- name: Determine whether Tmux needs to be (re)built
  set_fact:
    tmux_needs_build: "{{(tmux_build_stamp_slurp.content | default('') | b64decode | trim) != tmux_release_version}}"

- name: Configure, make, and install Tmux release (this will take a while)
  shell:
    chdir: "{{tmux_release_dir}}"
    executable: /bin/bash
    cmd: |
      set -ex
      cflags="{{tmux_release_cflags}}"
      ldflags=""
      configure_flags=""
      if [ "$(uname)" = Darwin ]; then
        # Feed brew's libevent and ncurses paths directly so no pkg-config is
        # required. tmux 3.6 also requires an explicit utf8proc choice on macOS;
        # enable it for correct Unicode width handling, passing its paths via
        # LIBUTF8PROC_* to likewise avoid pkg-config.
        for dep in libevent ncurses; do
          prefix="$(brew --prefix "$dep")"
          cflags="$cflags -I$prefix/include"
          ldflags="$ldflags -L$prefix/lib"
        done
        utf8proc_prefix="$(brew --prefix utf8proc)"
        export LIBUTF8PROC_CFLAGS="-I$utf8proc_prefix/include"
        export LIBUTF8PROC_LIBS="-L$utf8proc_prefix/lib -lutf8proc"
        configure_flags="--enable-utf8proc"
      fi
      CFLAGS="$cflags" LDFLAGS="$ldflags" ./configure --prefix={{xdg_prefix_home}} $configure_flags
      make
      make install
  when: tmux_needs_build

- name: Record Tmux build version
  copy:
    dest: "{{tmux_build_stamp}}"
    content: "{{tmux_release_version}}"
    mode: 0644
  when: tmux_needs_build

- name: Create Tmux directories
  file:
    dest: "{{item}}"
    state: directory
    mode: 0700
  with_items:
  - "{{tmux_config_dir}}"
  - "{{tmux_data_dir}}"
  - "{{tmux_plugins_data_dir}}"

- name: Render Tmux Vars template file
  template:
    src: vars.sh
    dest: "{{shellrc_config_dir}}/0-tmux.sh"
    mode: 0400

- name: Render Tmux config template files
  template:
    src: "{{item}}"
    dest: "{{tmux_config_dir}}/{{item}}"
    mode: 0400
  with_items:
  - tmux.conf

- name: Link Tmux executable files
  file:
    src: "{{dotfiles_src_dir}}/tmux/{{item}}"
    dest: "{{xdg_bin_home}}/{{item}}"
    state: link
    follow: no
    force: yes
  with_items:
  - tmux-theme

- name: Link Tmux data directory
  file:
    src: "{{tmux_data_dir}}"
    dest: ~/.tmux
    state: link
    follow: no
    force: yes

- name: Link Tmux Shell RC file
  file:
    src: "{{dotfiles_src_dir}}/tmux/3-tmux.sh"
    dest: "{{shellrc_config_dir}}/3-tmux.sh"
    state: link
    follow: no
    force: yes

- name: Link Tmux config file
  file:
    src: "{{tmux_config_dir}}/tmux.conf"
    dest: ~/.tmux.conf
    state: link
    follow: no
    force: yes

- name: Download Tmux TPM repository
  git:
    repo: "{{tmux_tpm_repo}}"
    dest: "{{tmux_tpm_data_dir}}"
    depth: 1
    force: yes

- name: Install Tmux plugins
  shell:
    executable: /bin/bash
    cmd: |
      if tmux info &>/dev/null; then
        tmux source ~/.tmux.conf
      fi
      export TMUX_PLUGIN_MANAGER_PATH='{{tmux_plugins_data_dir}}'
      {{tmux_tpm_data_dir}}/bin/install_plugins
