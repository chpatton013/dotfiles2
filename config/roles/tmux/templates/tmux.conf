###############################################################################
# Configuration
###############################################################################

# Status line
set-option -g status on
set-option -g status-interval 1
set-option -g status-position top
set-option -g status-left-length 55
set-option -g status-right-length 120
set-option -g status-left "#(prompt tmux-status-left)"
set-option -g status-right "#(prompt tmux-status-right)"
set-window-option -g window-status-format "#(prompt tmux-window-status)"
set-window-option -g window-status-current-format "#(prompt tmux-window-status-current)"

# Set window notifications.
set-window-option -g monitor-activity on
set-option -g visual-activity on

# 24 hour clock.
set-window-option -g clock-mode-style 24

# Automatically set window title.
set-window-option -g automatic-rename

# Pass focus events correctly.
set-option -g focus-events on

# Reduce escape-time delay from default 500 to 10. Speeds up ESC input.
set-option -s escape-time 10

# Explicitly invoke shell by environment variable.
set-option -g default-shell "$SHELL"

# Run reattach if on Mac.
if-shell "uname | grep --quiet Darwin" "set-option -g default-command 'reattach-to-user-namespace -l $SHELL'"

# Use 256-color screen emulation.
# Default for $TERM variable inside tmux.
set-option -g default-terminal "tmux-256color"
# Tell tmux that the external terminal application supports RGB colors.
set-option -as terminal-features ",xterm*:RGB"

# Enable modified keys such as "Alt+Enter". Needed so full-screen TUIs (nvim,
# Claude Code, Pi Agent) can distinguish Enter / Shift+Enter / Alt+Enter, which
# is how those apps insert a literal newline vs. submit.
#
# CAVEAT (multi-line paste into some TUIs shows `j` / drops newlines): tmux with
# `extended-keys on` has historically re-encoded control bytes *inside* a
# bracketed paste, so a pasted LF (0x0A = Ctrl-J) becomes an extended-key escape
# -- with `csi-u` that is `\e[106;5u` (106 = 'j'), so a TUI whose paste
# tokenizer doesn't decode CSI-u renders a stray `j` (or eats the newline).
# tmux 3.6 fixed pasting to copy input without interpretation (we build 3.6a --
# see tmux_release_version), so this should not occur at the tmux layer; if it
# still does, the running tmux is likely an older binary (PATH), or the residual
# is the TUI's own paste tokenizer (upstream, e.g. Claude Code). To experiment
# without losing Alt+Enter, try `set -g extended-keys-format xterm` (encodes as
# `\e[27;5;106~` instead); disabling extended-keys entirely is NOT a good
# workaround since it breaks Shift/Alt+Enter newline entry in those same TUIs.
# Refs: tmux/tmux#4663, neovim/neovim#38021, anthropics/claude-code#43169.
set -g extended-keys on
set -g extended-keys-format csi-u

# Color-scheme (light/dark) tracking via DEC mode 2031. Requires tmux >= 3.6
# (the `client-*-theme` hooks and passthrough relay); gated so older tmux loads
# this config without error. Lets applications inside tmux subscribe to the
# outer terminal's color scheme and lets tmux relay change notifications to
# panes. When the outer terminal reports a switch, publish it to the observable
# file the color-theme system reads: the status bar (status-interval 1) repaints
# via `prompt` within a second, and new shells inherit it through
# color_theme_name.
if-shell -b '[ "$(tmux -V | grep -oE "[0-9]+\.[0-9]+" | head -1 | tr -d .)" -ge 36 ]' " \
  set-option -g allow-passthrough on ; \
  set-hook -g client-dark-theme 'run-shell \"color-theme-set dark\"' ; \
  set-hook -g client-light-theme 'run-shell \"color-theme-set light\"' \
"

###############################################################################
# Keybindings
###############################################################################

# C-a is much easier to hit than C-b.
set-option -g prefix C-a
unbind C-b
bind C-a send-prefix

# New pane creation should preserve current path.
bind c new-window -c "#{pane_current_path}"

###############################################################################
# Plugins
###############################################################################

set-environment -g TMUX_PLUGIN_MANAGER_PATH '{{tmux_plugins_data_dir}}'

set-option -g @tpm_plugins '                                                   \
  seebi/tmux-colors-solarized                                                  \
  tmux-plugins/tmux-battery                                                    \
  tmux-plugins/tmux-continuum                                                  \
  tmux-plugins/tmux-copycat                                                    \
  tmux-plugins/tmux-cowboy                                                     \
  tmux-plugins/tmux-logging                                                    \
  tmux-plugins/tmux-pain-control                                               \
  tmux-plugins/tmux-resurrect                                                  \
  tmux-plugins/tmux-sensible                                                   \
  tmux-plugins/tmux-sidebar                                                    \
  tmux-plugins/tmux-yank                                                       \
  tmux-plugins/vim-tmux-focus-events                                           \
'

# tmux-colors-solarized
set -g @colors-solarized '256'

# tmux-prefix-highlight
set -g @prefix_highlight_fg 'white'
set -g @prefix_highlight_bg 'blue'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'

# tmux-sidebar
set -g @sidebar-tree-command 'tree -C --gitignore'

# tmux-resurrect
set-option -g @resurrect-capture-pane-contents 'on'
set-option -g @resurrect-save-shell-history 'off'
set-option -g @resurrect-strategy-nvim 'session'
set-option -g @resurrect-strategy-vim 'session'

# tmux-continuum
set-option -g @continuum-restore 'on'

# Initialize TMUX plugin manager (this must be the last line of tmux.conf)
run -b '{{tmux_tpm_data_dir}}/tpm'
