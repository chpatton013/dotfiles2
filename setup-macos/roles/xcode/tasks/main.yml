---

- name: Check if CommandLine Developer Tools already exist
  stat:
    path: /Library/Developer/CommandLineTools
  register: command_line_tools_stat

- block:
  - name: Accept XCode License
    shell:
      cmd: xcodebuild -license accept
    become: yes

  - name: Install CommandLine Developer Tools
    command:
      cmd: xcode-select --install
    become: yes
  when: command_line_tools_stat.stat.isdir is defined and command_line_tools_stat.stat.isdir == False

- name: Check if Rosetta 2 is already installed
  stat:
    path: /Library/Apple/usr/share/rosetta/rosetta
  register: rosetta_stat

- name: Install Rosetta 2
  command:
    cmd: softwareupdate --install-rosetta --agree-to-license
  become: yes
  when:
  - ansible_facts['architecture'] == "arm64"
  - not rosetta_stat.stat.exists
